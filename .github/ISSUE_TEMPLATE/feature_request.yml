name: Feature Request
description: Suggest an idea or enhancement for the project
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: What would you like to see added?
      placeholder: I would love to see support for...
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why is this feature needed?
      placeholder: This would help AI engineers to...
